name: Feature request
description: Suggest an idea or enhancement for Amneshia
title: '[FEAT] '
labels: ['enhancement']
assignees: ['SabilMurti']
body:
  - type: markdown
    attributes:
      value: Thank you for suggesting a new feature for Amneshia!
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the feature...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case & Motivation
      description: Why is this feature needed and how will it help AI agents or users?
