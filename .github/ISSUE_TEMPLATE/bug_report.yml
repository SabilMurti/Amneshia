name: Bug report
description: Create a report to help us improve Amneshia
title: '[BUG] '
labels: ['bug']
assignees: ['SabilMurti']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what happened...
    validations:
      required: true
  - type: textarea
    id: error-logs
    attributes:
      label: Error Logs & Terminal Output
      description: Paste any relevant error logs or terminal outputs.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Node version, OS, Amneshia version, IDE (Cursor/Antigravity/Claude Code)
      placeholder: |
        - Node Version: v20.x
        - OS: Ubuntu 24.04 WSL2
        - Amneshia Version: v2.0.0
